id: dbt
name: dbt
description: A MCP server for interacting with dbt, providing AI agents with context from dbt Core, dbt Fusion, and dbt
  Platform. Supports SQL execution, Semantic Layer queries, project discovery, dbt CLI operations, Admin API management,
  code generation, and column-level lineage tracing.
author: dbt-labs
url: https://github.com/dbt-labs/dbt-mcp
tags:
  - dbt
  - data-engineering
  - data-analytics
  - sql
  - semantic-layer
  - data-modeling
  - mcp-server
  - llm
prerequisites:
  - Python and uv
content:
  - name: UVX (dbt Cloud)
    description: Uses OAuth to authenticate with your dbt Cloud account. Provides platform features (Discovery API, Semantic Layer, job management) without local CLI commands.
    prerequisites:
      - dbt Cloud account with static subdomain
    content: |
      {
        "command": "uvx",
        "args": ["dbt-mcp"],
        "env": {
          "DBT_HOST": "{{DBT_HOST}}"
        }
      }
  - name: UVX (dbt Cloud + CLI)
    description: Uses OAuth with dbt Cloud and also enables local dbt CLI commands for running, building, and testing dbt projects.
    prerequisites:
      - dbt Cloud account with static subdomain
      - dbt CLI installed locally
    content: |
      {
        "command": "uvx",
        "args": ["dbt-mcp"],
        "env": {
          "DBT_HOST": "{{DBT_HOST}}",
          "DBT_PROJECT_DIR": "{{DBT_PROJECT_DIR}}",
          "DBT_PATH": "{{DBT_PATH}}"
        }
      }
    parameters:
      - name: dbt Project Directory
        key: DBT_PROJECT_DIR
        placeholder: /path/to/your/dbt/project
      - name: dbt Executable Path
        key: DBT_PATH
        placeholder: /path/to/your/dbt/executable
  - name: UVX (CLI only)
    description: Runs dbt MCP locally with your dbt project using dbt Core or Fusion CLI. No dbt Cloud account required.
    prerequisites:
      - dbt CLI installed locally
    content: |
      {
        "command": "uvx",
        "args": ["dbt-mcp"],
        "env": {
          "DBT_PROJECT_DIR": "{{DBT_PROJECT_DIR}}",
          "DBT_PATH": "{{DBT_PATH}}"
        }
      }
    parameters:
      - name: dbt Project Directory
        key: DBT_PROJECT_DIR
        placeholder: /path/to/your/dbt/project
      - name: dbt Executable Path
        key: DBT_PATH
        placeholder: /path/to/your/dbt/executable
  - name: Docker
    description: Container-based installation using a dbt Cloud service token for authentication. Provides platform features without local dbt installation.
    prerequisites:
      - Docker
      - dbt Cloud account
      - dbt Cloud service token
    content: |
      {
        "command": "docker",
        "args": ["run", "-i", "--rm", "-e", "DBT_HOST", "-e", "DBT_TOKEN", "-e", "DBT_PROD_ENV_ID", "ghcr.io/dbt-labs/dbt-mcp:latest"],
        "env": {
          "DBT_HOST": "{{DBT_HOST}}",
          "DBT_TOKEN": "{{DBT_TOKEN}}",
          "DBT_PROD_ENV_ID": "{{DBT_PROD_ENV_ID}}"
        }
      }
    parameters:
      - name: dbt Production Environment ID
        key: DBT_PROD_ENV_ID
        placeholder: your_production_environment_id
      - name: dbt Service Token
        key: DBT_TOKEN
        placeholder: your_dbt_service_token
parameters:
  - name: dbt Host
    key: DBT_HOST
    placeholder: cloud.getdbt.com
