name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: selfhosted
    env:
      TEST_IMAGE: innate-os-test:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build --progress=plain -t ${TEST_IMAGE} -f Dockerfile.test . 2>&1

      - name: Run integration tests
        run: |
          INNATE_TEST_IMAGE=${TEST_IMAGE} docker compose -f docker-compose.test.yml up \
            --abort-on-container-exit \
            --exit-code-from integration-test

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down || true
          docker rmi ${TEST_IMAGE} || true
