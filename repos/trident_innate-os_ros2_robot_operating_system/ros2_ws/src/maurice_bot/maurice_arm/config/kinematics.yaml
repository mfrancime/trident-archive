robot_description_kinematics:
  # planning‐group name must match your SRDF <group name="manipulator">
  arm:
    # which plugin to use for IK:
    kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin

    # how fine‐grained the search grid is (radians)
    kinematics_solver_search_resolution: 0.005

    # how long (seconds) to keep searching for a solution
    kinematics_solver_timeout: 0.1
