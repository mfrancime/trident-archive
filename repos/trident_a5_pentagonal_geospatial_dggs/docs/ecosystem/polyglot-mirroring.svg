<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000030"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000040"/>
    </filter>
    <marker id="arrowhead" markerWidth="4" markerHeight="3" refX="3.5" refY="1.5" orient="auto">
      <polygon points="0 0, 4 1.5, 0 3" fill="#6F8196"/>
    </marker>
    <marker id="arrowhead-reverse" markerWidth="4" markerHeight="3" refX="0.5" refY="1.5" orient="auto">
      <polygon points="4 0, 0 1.5, 4 3" fill="#6F8196"/>
    </marker>
  </defs>
  
  <!-- TypeScript Implementation (top) -->
  <rect x="220" y="40" width="160" height="90" rx="10" fill="#00AA55" filter="url(#shadow)"/>
  <text x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" filter="url(#textShadow)">TypeScript</text>
  <text x="300" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F7FAFC" filter="url(#textShadow)">Visualization</text>
  <text x="300" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F7FAFC" filter="url(#textShadow)">Web-first</text>
  
  <!-- Python Implementation (bottom left) -->
  <rect x="100" y="260" width="160" height="90" rx="10" fill="hsl(150, 100%, 35%)" filter="url(#shadow)"/>
  <text x="180" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" filter="url(#textShadow)">Python</text>
  <text x="180" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F7FAFC" filter="url(#textShadow)">Data science</text>
  <text x="180" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F7FAFC" filter="url(#textShadow)">ML/AI workflows</text>
  
  <!-- Rust Implementation (bottom right) -->
  <rect x="340" y="260" width="160" height="90" rx="10" fill="hsl(150, 100%, 25%)" filter="url(#shadow)"/>
  <text x="420" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" filter="url(#textShadow)">Rust</text>
  <text x="420" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F7FAFC" filter="url(#textShadow)">High performance</text>
  <text x="420" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F7FAFC" filter="url(#textShadow)">Systems programming</text>
  
  <!-- Three bidirectional lines forming triangle -->
  <!-- TS <-> Python -->
  <line x1="265" y1="130" x2="195" y2="260" stroke="#6F8196" stroke-width="3" marker-start="url(#arrowhead-reverse)" marker-end="url(#arrowhead)"/>
  
  <!-- TS <-> Rust -->
  <line x1="335" y1="130" x2="405" y2="260" stroke="#6F8196" stroke-width="3" marker-start="url(#arrowhead-reverse)" marker-end="url(#arrowhead)"/>
  
  <!-- Python <-> Rust -->
  <line x1="260" y1="305" x2="340" y2="305" stroke="#6F8196" stroke-width="3" marker-start="url(#arrowhead-reverse)" marker-end="url(#arrowhead)"/>
</svg>